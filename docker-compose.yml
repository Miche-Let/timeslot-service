services:
  timeslot-service:
    build: .
    container_name: timeslot-service
    hostname: timeslot-service
    ports:
      - "19400:19400"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - shared-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml 
    networks:
      - shared-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - shared-network

networks:
  shared-network:
    name: ${NETWORK_NAME}
    external: true