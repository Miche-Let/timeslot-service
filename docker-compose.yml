services:
  timeslot-service:
    build: .
    container_name: timeslot-service
    hostname: timeslot-service
    ports:
      - "19400:19400"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - michelet-network

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml 
    networks:
      - michelet-network

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - michelet-network

networks:
  michelet-network:
    external: true