server:
  port: 19400
  tomcat:
    threads:
      max: 300
      min-spare: 20
    accept-count: 200

spring:
  application:
    name: timeslot-service

  profiles:
    default: local

  datasource:
    url: jdbc:postgresql://${POSTGRES_CONTAINER_NAME:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:michelet_db}?currentSchema=timeslot_service
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: timeslot_service

internal:
  auth:
    secret: ${JWT_SECRET:michelet-internal-auth-secret-key-a8K2mQ9xLp4Vt7Rz1Nc}

eureka:
  client:
    register-with-eureka: true 
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: timeslot-service