server:
  port: 19400

spring:
  application:
    name: timeslot-service

  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/michelet_db?currentSchema=timeslot_service
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        default_schema: timeslot_service
        format_sql: true
        highlight_sql: true

internal:
  auth:
    secret: michelet-internal-auth-secret-key-a8K2mQ9xLp4Vt7Rz1Nc

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://host.docker.internal:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false